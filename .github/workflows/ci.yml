name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, format & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install tools
        # No package install: ruff/black lint the tree directly and pyright
        # reads the source under src/ (rapidfuzz is the only third-party import
        # it needs to resolve; the lazy `import whisper` carries a type ignore).
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pyright rapidfuzz
      - name: Ruff (lint)
        run: ruff check .
      - name: Black (format check)
        run: black --check --diff .
      - name: Pyright (type check)
        run: pyright src

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # setuptools-scm needs history/tags to compute a version
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package (without heavy Whisper/torch)
        # The suite injects a fake Whisper model and never loads torch, so we
        # skip the package's heavy runtime deps and install only what it needs.
        run: |
          python -m pip install --upgrade pip
          pip install --no-deps -e .
          pip install rapidfuzz pytest
      - name: Run tests
        run: pytest -ra

  docs:
    name: Build docs (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt
      - name: Install docs tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
      - name: Build site
        run: mkdocs build --strict
