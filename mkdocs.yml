site_name: syncalong
site_description: >-
  Forced-alignment library and CLI that timestamps lyrics against an audio
  file and exports LRC.
site_url: https://syncalong.readthedocs.io/
repo_url: https://github.com/wickeddoc/syncalong
repo_name: wickeddoc/syncalong
copyright: Copyright &copy; 2026 wickeddoc — MIT License

# SDD process artifacts (plans/specs), not part of the published site.
exclude_docs: |
  superpowers/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            docstring_section_style: table
            members_order: source
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true

nav:
  - Home: index.md
  - Installation: installation.md
  - CLI guide: cli.md
  - Library guide: library.md
  - How it works: how-it-works.md
  - Benchmarks: benchmarks.md
  - Remote (server/client): remote.md
  - API reference:
      - Overview: reference/index.md
      - syncalong.pipeline: reference/pipeline.md
      - syncalong.transcribe: reference/transcribe.md
      - syncalong.remote: reference/remote.md
      - syncalong.server: reference/server.md
      - syncalong.lyrics: reference/lyrics.md
      - syncalong.align: reference/align.md
      - syncalong.formatter: reference/formatter.md
      - syncalong.vocal_separator: reference/vocal_separator.md
      - syncalong.textnorm: reference/textnorm.md
  - Contributing: contributing.md
  - Changelog: changelog.md
