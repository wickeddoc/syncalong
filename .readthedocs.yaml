# ReadTheDocs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

mkdocs:
  configuration: mkdocs.yml

# Only the documentation toolchain is installed. The package's runtime deps
# (openai-whisper -> torch) are intentionally left out; mkdocstrings introspects
# the source statically from `src/`, so the build stays fast and light.
python:
  install:
    - requirements: docs/requirements.txt
